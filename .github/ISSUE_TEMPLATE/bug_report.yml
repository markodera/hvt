name: Bug report
description: Report a reproducible defect in HVT
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the current behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable repro you can.
      placeholder: |
        1. Configure ...
        2. Send request to ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, database, and deployment style.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Redact secrets before posting.
