          maxLength: 500
        events:
          description: List of event types to subscribe to
        description:
          type: string
        is_active:
          type: boolean
      required:
      - url
  securitySchemes:
    APIKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Organization API key (hvt_live_* or hvt_test_*)
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token. Obtain via POST /api/v1/auth/login/
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: Auth
  description: Login, registration, password reset, social OAuth, and token management
- name: Users
  description: User CRUD, role management, and organization membership
- name: Organizations
  description: Organization lifecycle and configuration
- name: API Keys
  description: Create, list, and revoke API keys for server-to-server auth
- name: Webhooks
  description: Configure webhooks for auth event notifications
