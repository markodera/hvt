          nullable: true
          readOnly: true
        target_type:
          type: string
          nullable: true
          readOnly: true
        target_object_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        organization:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        user_agent:
          type: string
          readOnly: true
        success:
          type: boolean
          readOnly: true
          description: Whether the action succeeded
        error_message:
          type: string
          readOnly: true
